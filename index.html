<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>😂 MEME ZONE: SACHCHAI KA DARWAJA 😂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, #2b2b2b, #0f0f0f);
            font-family: 'Impact', 'Arial Black', 'Segoe UI', 'Comic Neue', cursive;
            position: relative;
        }

        /* FIRST PAGE - MEME STYLE (BUTTONS SIDE BY SIDE) */
        .first-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 20;
            background: radial-gradient(circle at 20% 30%, #2b2b2b, #0f0f0f);
            transition: opacity 0.5s ease, visibility 0.5s ease;
            padding: 20px;
        }

        .first-page.hide-first {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .meme-container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            border-top: 5px solid #ffcc00;
            border-bottom: 5px solid #ffcc00;
            border-radius: 20px;
        }

        .meme-question {
            font-size: clamp(1.8rem, 8vw, 4rem);
            font-weight: 900;
            color: #FFDD44;
            text-shadow: 4px 4px 0px #c0392b, 2px 2px 0px #000;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-family: 'Impact', 'Arial Black', monospace;
            word-break: break-word;
            line-height: 1.2;
        }

        .meme-sub {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            background: #222;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffdd88;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid #ffaa33;
            box-shadow: 0 0 5px #ffcc44;
            margin-bottom: 20px;
        }

        /* BUTTON GROUP: FLEX SIDE BY SIDE - RESPONSIVE */
        .button-group-meme {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin: 20px 0 10px;
            position: relative;
            z-index: 25;
            padding: 0 10px;
        }

        /* Base button style - MEME BOLD */
        .meme-btn {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: bold;
            padding: 12px 20px;
            min-width: 120px;
            border-radius: 60px;
            cursor: pointer;
            font-family: 'Impact', 'Arial Black', monospace;
            letter-spacing: 1px;
            transition: 0.1s linear;
            border: none;
            box-shadow: 0 6px 0px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 0 1 auto;
        }

        .btn-yes-meme {
            background: linear-gradient(145deg, #2ecc71, #1f8a4c);
            color: white;
            text-shadow: 2px 2px 0 #1f5a32;
            border-bottom: 3px solid #f1c40f;
        }

        .btn-yes-meme:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.3);
        }

        /* THE NO BUTTON - initially in flex, becomes absolute when floating */
        .btn-no-meme {
            background: linear-gradient(145deg, #e74c3c, #a82313);
            color: white;
            text-shadow: 2px 2px 0 #5a1e14;
            border-bottom: 3px solid #ffcc44;
            position: relative;
            transition: left 0.1s cubic-bezier(0.2, 1.3, 0.8, 1), top 0.1s cubic-bezier(0.2, 1.3, 0.8, 1);
            z-index: 100;
        }

        .meme-footer-text {
            margin-top: 25px;
            font-size: clamp(0.8rem, 4vw, 1.1rem);
            background: #1e1a0c;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 60px;
            color: #ffbb55;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 6px solid #ffaa33;
            letter-spacing: 1px;
        }

        /* DOOR ANIMATION (overlay) - RESPONSIVE */
        .door-animation-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: min(280px, 70vw);
            height: min(280px, 70vw);
            background: #4a2e1a;
            border-radius: 20px;
            box-shadow: 0 0 0 max(8px, 3vw) #ffb347, 0 25px 45px black;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.2, 1.2, 0.4, 1);
            overflow: hidden;
            border: 3px ridge #ffdd99;
        }

        .door-left-panel, .door-right-panel {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: #8b5a2b;
            transition: transform 0.55s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 2;
            box-shadow: inset -2px 0 8px rgba(0,0,0,0.5);
        }

        .door-left-panel {
            left: 0;
            transform-origin: left;
            border-right: 2px solid #ffcc66;
        }
        .door-right-panel {
            right: 0;
            transform-origin: right;
            border-left: 2px solid #ffcc66;
        }
        .door-left-panel::after {
            content: "🔴";
            position: absolute;
            right: 15px;
            top: 50%;
            font-size: clamp(20px, 6vw, 32px);
            transform: translateY(-50%);
            opacity: 0.9;
        }
        .door-right-panel::after {
            content: "🔴";
            position: absolute;
            left: 15px;
            top: 50%;
            font-size: clamp(20px, 6vw, 32px);
            transform: translateY(-50%);
            opacity: 0.9;
        }

        /* FINAL DOG PAGE - LAST PAGE, NO BUTTONS - RESPONSIVE */
        .dog-final-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #1f1b10, #0a0a0a);
            backdrop-filter: blur(10px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.6s ease;
            text-align: center;
            padding: 20px;
        }

        .dog-final-page.show {
            visibility: visible;
            opacity: 1;
        }

        .dog-card {
            background: #1f1b10;
            padding: 20px;
            border-radius: min(60px, 10vw);
            border: 4px solid #ffcc33;
            box-shadow: 0 0 0 max(8px, 2vw) #9b6a2e, 0 25px 50px black;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: zoomMemeFinal 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes zoomMemeFinal {
            0% { transform: scale(0.6) rotate(-4deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .dog-image {
            max-width: 85vw;
            max-height: 55vh;
            width: auto;
            height: auto;
            border-radius: min(48px, 8vw);
            border: 4px solid #ffbb44;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            object-fit: contain;
            background: #00000066;
        }

        .dog-victory-text {
            margin-top: 20px;
            font-size: clamp(1.2rem, 6vw, 2rem);
            font-weight: 900;
            font-family: 'Impact', monospace;
            background: linear-gradient(135deg, #FFD966, #FF8C42, #FF3B3F);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 8px 16px;
            background-color: #2c1e0f;
            border-radius: 60px;
            display: inline-block;
            text-align: center;
            line-height: 1.3;
        }

        /* Floating celebration effect */
        .floating-meme {
            position: fixed;
            pointer-events: none;
            z-index: 400;
            font-size: clamp(20px, 6vw, 36px);
            animation: floatMemesUp 2.2s forwards;
        }

        @keyframes floatMemesUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-350px) scale(1.4); opacity: 0; }
        }

        /* Hide yes button after click */
        .hide-yes-meme {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: 0.2s;
        }

        /* Hide NO button completely when second page opens */
        .no-btn-hidden {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* Mobile specific touch optimizations */
        @media (max-width: 480px) {
            .meme-container {
                width: 95%;
                padding: 1rem;
            }
            
            .button-group-meme {
                gap: 0.8rem;
            }
            
            .meme-btn {
                padding: 10px 16px;
                min-width: 100px;
            }
            
            .dog-card {
                padding: 15px;
            }
            
            .dog-image {
                max-height: 50vh;
            }
        }

        /* Tablet specific */
        @media (min-width: 481px) and (max-width: 768px) {
            .meme-container {
                width: 85%;
                max-width: 500px;
            }
            
            .meme-btn {
                padding: 12px 24px;
                min-width: 140px;
            }
        }
    </style>
</head>
<body>

<!-- FIRST PAGE: QUESTION + BUTTONS (SIDE BY SIDE) -->
<div class="first-page" id="firstPage">
    <div class="meme-container">
        <div class="meme-question">😂 BHAI TU EK NUMBER KA GANDU HAI NA? 😂</div>
        <div class="meme-sub">💀 SACHCHAI KA DARWAJA KHOLO 💀</div>
        
        <!-- BUTTONS SIDE BY SIDE (FLEX) -->
        <div class="button-group-meme" id="memeButtonGroup">
            <button class="meme-btn btn-yes-meme" id="yesMemeBtn">✔️ HAAN</button>
            <button class="meme-btn btn-no-meme" id="noMemeBtn">❌ NAHI</button>
        </div>
        <div class="meme-footer-text">👇 MAUKA HAI TOH CLICK KAR 👇</div>
    </div>
</div>

<!-- DOOR OVERLAY ANIMATION -->
<div id="doorContainerMeme" class="door-animation-container">
    <div class="door-left-panel" id="leftDoorMeme"></div>
    <div class="door-right-panel" id="rightDoorMeme"></div>
    <div style="position: absolute; width:100%; height:100%; display: flex; align-items: center; justify-content: center; z-index:1; font-size: clamp(35px, 12vw, 55px); font-weight: bold; color:#ffcc66;">🚪</div>
</div>

<!-- FINAL DOG PAGE (LAST PAGE - NO BUTTONS) -->
<div id="dogFinalPage" class="dog-final-page">
    <div class="dog-card">
        <img id="dogImageFinal" class="dog-image" alt="DOG LAUGH MEME" src="image/doglaugh.jpg">
        <div class="dog-victory-text">✨ DEKHA MAINE KAHA THA GANDU HAI TU ✨</div>
    </div>
</div>

<script>
    (function() {
        // DOM Elements
        const firstPage = document.getElementById('firstPage');
        const yesBtn = document.getElementById('yesMemeBtn');
        const noBtn = document.getElementById('noMemeBtn');
        const doorContainer = document.getElementById('doorContainerMeme');
        const leftDoor = document.getElementById('leftDoorMeme');
        const rightDoor = document.getElementById('rightDoorMeme');
        const dogFinalPage = document.getElementById('dogFinalPage');
        const dogImg = document.getElementById('dogImageFinal');

        let isYesActivated = false;
        let noFloatingActive = false;
        let evasionActive = false;
        
        // Image fallback
        dogImg.onerror = function() {
            this.src = "https://media1.tenor.com/m/-JjW8KJ0hS4AAAAC/dog-pointing.gif";
            this.alt = "doglaugh missing but meme continues";
            console.warn("Make sure 'image/doglaugh.jpg' exists");
        };
        
        // Hide NO button completely
        function hideNoButtonCompletely() {
            if (noBtn) {
                noBtn.classList.add('no-btn-hidden');
                noBtn.style.display = 'none';
                noBtn.style.visibility = 'hidden';
                noBtn.style.pointerEvents = 'none';
            }
        }
        
        // NO button floating mechanism
        function makeNoButtonFloating() {
            if (noFloatingActive) return;
            if (isYesActivated) return;
            if (!noBtn) return;
            
            document.body.appendChild(noBtn);
            noBtn.style.position = 'absolute';
            noBtn.style.margin = '0';
            noBtn.style.top = '0px';
            noBtn.style.left = '0px';
            noBtn.style.zIndex = '9999';
            noBtn.style.transition = 'left 0.12s cubic-bezier(0.2, 1.3, 0.8, 1), top 0.12s cubic-bezier(0.2, 1.3, 0.8, 1)';
            noFloatingActive = true;
            relocateNoAbsolute();
        }
        
        function getRandomViewportPos() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (!noBtn) return { x: 100, y: 100 };
            const btnRect = noBtn.getBoundingClientRect();
            let btnW = btnRect.width || 120;
            let btnH = btnRect.height || 55;
            const maxX = Math.max(15, w - btnW - 20);
            const maxY = Math.max(15, h - btnH - 20);
            let randX = Math.random() * maxX;
            let randY = Math.random() * maxY;
            randX = Math.min(maxX - 5, Math.max(10, randX));
            randY = Math.min(maxY - 5, Math.max(10, randY));
            return { x: randX, y: randY };
        }
        
        function relocateNoAbsolute() {
            if (!noFloatingActive) return;
            if (isYesActivated) return;
            if (!noBtn) return;
            if (noBtn.classList.contains('no-btn-hidden')) return;
            const { x, y } = getRandomViewportPos();
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            noBtn.style.transform = 'rotate(1deg)';
            setTimeout(() => { 
                if(noBtn && noFloatingActive && !noBtn.classList.contains('no-btn-hidden')) 
                    noBtn.style.transform = ''; 
            }, 100);
        }
        
        function startGlobalEvasion() {
            if (evasionActive) return;
            evasionActive = true;
            
            const handleMove = (e) => {
                if (!noFloatingActive || isYesActivated) return;
                if (!noBtn) return;
                if (noBtn.classList.contains('no-btn-hidden')) return;
                
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                const rect = noBtn.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                const dist = Math.hypot(clientX - centerX, clientY - centerY);
                if (dist < 100) relocateNoAbsolute();
            };
            
            document.addEventListener('mousemove', handleMove);
            document.addEventListener('touchmove', handleMove);
        }
        
        function bindNoEscape() {
            if (!noBtn) return;
            
            noBtn.addEventListener('mouseenter', function(e) {
                if (isYesActivated) return;
                if (noBtn.classList.contains('no-btn-hidden')) return;
                if (!noFloatingActive) {
                    makeNoButtonFloating();
                    startGlobalEvasion();
                } else {
                    relocateNoAbsolute();
                }
            });
            
            noBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (isYesActivated) return;
                if (noBtn.classList.contains('no-btn-hidden')) return;
                if (!noFloatingActive) {
                    makeNoButtonFloating();
                    startGlobalEvasion();
                }
                relocateNoAbsolute();
                return false;
            });
            
            noBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                if (isYesActivated) return;
                if (noBtn.classList.contains('no-btn-hidden')) return;
                if (!noFloatingActive) {
                    makeNoButtonFloating();
                    startGlobalEvasion();
                } else {
                    relocateNoAbsolute();
                }
            });
            
            window.addEventListener('resize', () => {
                if (noFloatingActive && !isYesActivated && noBtn && !noBtn.classList.contains('no-btn-hidden')) {
                    const { x, y } = getRandomViewportPos();
                    noBtn.style.left = x + 'px';
                    noBtn.style.top = y + 'px';
                }
            });
        }
        
        // YES button door magic
        function startDoorAndRevealDog() {
            if (isYesActivated) return;
            isYesActivated = true;
            
            hideNoButtonCompletely();
            yesBtn.classList.add('hide-yes-meme');
            
            const btnRect = yesBtn.getBoundingClientRect();
            const startX = btnRect.left + btnRect.width/2;
            const startY = btnRect.top + btnRect.height/2;
            
            doorContainer.style.transition = 'all 0.45s cubic-bezier(0.2, 1.2, 0.3, 1)';
            doorContainer.style.left = startX + 'px';
            doorContainer.style.top = startY + 'px';
            doorContainer.style.transform = 'translate(-50%, -50%) scale(0.15)';
            doorContainer.style.opacity = '1';
            doorContainer.style.visibility = 'visible';
            doorContainer.style.width = '60px';
            doorContainer.style.height = '60px';
            doorContainer.style.borderRadius = '30px';
            
            doorContainer.offsetHeight;
            
            doorContainer.style.width = 'min(380px, 80vw)';
            doorContainer.style.height = 'min(420px, 80vh)';
            doorContainer.style.borderRadius = '36px';
            doorContainer.style.left = '50%';
            doorContainer.style.top = '50%';
            doorContainer.style.transform = 'translate(-50%, -50%) scale(1)';
            
            setTimeout(() => {
                if (leftDoor) leftDoor.style.transform = 'rotateY(-90deg)';
                if (rightDoor) rightDoor.style.transform = 'rotateY(90deg)';
                doorContainer.style.boxShadow = '0 0 0 8px #ffaa44, 0 30px 50px black';
                
                setTimeout(() => {
                    doorContainer.style.visibility = 'hidden';
                    doorContainer.style.opacity = '0';
                    
                    if (firstPage) {
                        firstPage.classList.add('hide-first');
                    }
                    
                    dogImg.src = "image/doglaugh.jpg?" + Date.now();
                    dogFinalPage.classList.add('show');
                    generateMemeConfetti();
                    
                }, 550);
            }, 480);
        }
        
        function generateMemeConfetti() {
            for (let i=0; i<60; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    const icons = ['😂', '🤣', '🔥', '💀', '👌', '💯', '🐕', '👉', '😎', '✨', '🎉'];
                    el.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                    el.classList.add('floating-meme');
                    el.style.left = Math.random() * window.innerWidth + 'px';
                    el.style.bottom = '-30px';
                    el.style.fontSize = (Math.random() * 30 + 20) + 'px';
                    el.style.animationDuration = (Math.random() * 1.8 + 1.4) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 2100);
                }, i * 30);
            }
        }
        
        function initDoorStyle() {
            if(leftDoor && rightDoor) {
                leftDoor.style.transition = 'transform 0.55s ease-in-out';
                rightDoor.style.transition = 'transform 0.55s ease-in-out';
                leftDoor.style.transform = 'rotateY(0deg)';
                rightDoor.style.transform = 'rotateY(0deg)';
                leftDoor.style.backgroundColor = '#b87a2b';
                rightDoor.style.backgroundColor = '#b87a2b';
            }
            doorContainer.style.visibility = 'hidden';
            doorContainer.style.opacity = '0';
        }
        
        function bindYesAction() {
            yesBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (isYesActivated) return;
                startDoorAndRevealDog();
            });
            yesBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (isYesActivated) return;
                startDoorAndRevealDog();
            });
        }
        
        function preloadDogImage() {
            const testImg = new Image();
            testImg.onload = () => console.log("✅ doglaugh.jpg ready");
            testImg.onerror = () => console.warn("⚠️ image/doglaugh.jpg not found");
            testImg.src = "image/doglaugh.jpg";
        }
        
        window.addEventListener('load', () => {
            initDoorStyle();
            bindNoEscape();
            bindYesAction();
            preloadDogImage();
            
            if (firstPage) firstPage.classList.remove('hide-first');
            dogFinalPage.classList.remove('show');
            
            if (noBtn) {
                noBtn.style.position = 'relative';
                noBtn.style.display = 'inline-flex';
                noBtn.classList.remove('no-btn-hidden');
            }
        });
        
        window.addEventListener('resize', () => {
            if (noFloatingActive && !isYesActivated && noBtn && !noBtn.classList.contains('no-btn-hidden')) {
                const { x, y } = getRandomViewportPos();
                noBtn.style.left = x + 'px';
                noBtn.style.top = y + 'px';
            }
        });
        
    })();
</script>
</body>
</html>
