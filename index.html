<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>😂 MEME ZONE: SACHCHAI KA DARWAJA 😂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, #2b2b2b, #0f0f0f);
            font-family: 'Impact', 'Arial Black', 'Segoe UI', 'Comic Neue', cursive;
            position: relative;
        }

        /* FIRST PAGE - MEME STYLE (BUTTONS SIDE BY SIDE) */
        .first-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 20;
            background: radial-gradient(circle at 20% 30%, #2b2b2b, #0f0f0f);
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .first-page.hide-first {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .meme-container {
            text-align: center;
            width: 100%;
            padding: 1rem 2rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            border-top: 5px solid #ffcc00;
            border-bottom: 5px solid #ffcc00;
        }

        /* ========== FIXED: Mobile responsive shadow & spacing ========== */
        .meme-question {
            font-size: clamp(2rem, 9vw, 6rem);
            font-weight: 900;
            color: #FFDD44;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-family: 'Impact', 'Arial Black', monospace;
            word-break: keep-all;
            line-height: 1.2;
        }
        
        /* Laptop/Desktop view (screen width > 768px) - original shadow */
        @media (min-width: 769px) {
            .meme-question {
                text-shadow: 6px 6px 0px #c0392b, 3px 3px 0px #000;
            }
        }
        
        /* Mobile view (screen width <= 768px) - reduced shadow, better spacing */
        @media (max-width: 768px) {
            .meme-question {
                text-shadow: 3px 3px 0px #c0392b, 2px 2px 0px #000;
                letter-spacing: 1px;
                margin-bottom: 15px;
                padding: 0 5px;
            }
        }
        
        /* Extra small devices (<= 480px) - even smaller shadow */
        @media (max-width: 480px) {
            .meme-question {
                text-shadow: 2px 2px 0px #c0392b, 1px 1px 0px #000;
                letter-spacing: 0.5px;
                margin-bottom: 12px;
            }
        }
        /* ========== END FIX ========== */

        .meme-sub {
            font-size: 1.2rem;
            background: #222;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            color: #ffdd88;
            font-family: monospace;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid #ffaa33;
            box-shadow: 0 0 5px #ffcc44;
            margin-bottom: 25px;
        }

        /* BUTTON GROUP: FLEX SIDE BY SIDE */
        .button-group-meme {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 20px 0 10px;
            position: relative;
            z-index: 25;
        }

        /* Base button style - MEME BOLD */
        .meme-btn {
            font-size: 2.2rem;
            font-weight: bold;
            padding: 14px 30px;
            min-width: 170px;
            border-radius: 60px;
            cursor: pointer;
            font-family: 'Impact', 'Arial Black', monospace;
            letter-spacing: 2px;
            transition: 0.1s linear;
            border: none;
            box-shadow: 0 8px 0px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-yes-meme {
            background: linear-gradient(145deg, #2ecc71, #1f8a4c);
            color: white;
            text-shadow: 2px 2px 0 #1f5a32;
            border-bottom: 3px solid #f1c40f;
        }

        .btn-yes-meme:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.3);
        }

        /* THE NO BUTTON - initially in flex, becomes absolute when floating */
        .btn-no-meme {
            background: linear-gradient(145deg, #e74c3c, #a82313);
            color: white;
            text-shadow: 2px 2px 0 #5a1e14;
            border-bottom: 3px solid #ffcc44;
            position: relative;
            transition: left 0.1s cubic-bezier(0.2, 1.3, 0.8, 1), top 0.1s cubic-bezier(0.2, 1.3, 0.8, 1);
            z-index: 100;
        }

        .meme-footer-text {
            margin-top: 35px;
            font-size: 1.3rem;
            background: #1e1a0c;
            display: inline-block;
            padding: 6px 24px;
            border-radius: 60px;
            color: #ffbb55;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 8px solid #ffaa33;
            letter-spacing: 1px;
        }

        /* DOOR ANIMATION (overlay) */
        .door-animation-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 280px;
            height: 280px;
            background: #4a2e1a;
            border-radius: 20px;
            box-shadow: 0 0 0 12px #ffb347, 0 25px 45px black;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.2, 1.2, 0.4, 1);
            overflow: hidden;
            border: 3px ridge #ffdd99;
        }

        .door-left-panel, .door-right-panel {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: #8b5a2b;
            transition: transform 0.55s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 2;
            box-shadow: inset -2px 0 8px rgba(0,0,0,0.5);
        }

        .door-left-panel {
            left: 0;
            transform-origin: left;
            border-right: 2px solid #ffcc66;
        }
        .door-right-panel {
            right: 0;
            transform-origin: right;
            border-left: 2px solid #ffcc66;
        }
        .door-left-panel::after {
            content: "🔴";
            position: absolute;
            right: 15px;
            top: 50%;
            font-size: 32px;
            opacity: 0.9;
        }
        .door-right-panel::after {
            content: "🔴";
            position: absolute;
            left: 15px;
            top: 50%;
            font-size: 32px;
            opacity: 0.9;
        }

        /* FINAL DOG PAGE - LAST PAGE, NO BUTTONS */
        .dog-final-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #1f1b10, #0a0a0a);
            backdrop-filter: blur(10px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.6s ease;
            text-align: center;
        }

        .dog-final-page.show {
            visibility: visible;
            opacity: 1;
        }

        .dog-card {
            background: #1f1b10;
            padding: 25px 20px;
            border-radius: 60px;
            border: 6px solid #ffcc33;
            box-shadow: 0 0 0 12px #9b6a2e, 0 25px 50px black;
            max-width: 90vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: zoomMemeFinal 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes zoomMemeFinal {
            0% { transform: scale(0.6) rotate(-4deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .dog-image {
            max-width: 85vw;
            max-height: 65vh;
            border-radius: 48px;
            border: 5px solid #ffbb44;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            object-fit: contain;
            background: #00000066;
        }

        .dog-victory-text {
            margin-top: 28px;
            font-size: 2.8rem;
            font-weight: 900;
            font-family: 'Impact', monospace;
            background: linear-gradient(135deg, #FFD966, #FF8C42, #FF3B3F);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 24px;
            background-color: #2c1e0f;
            border-radius: 80px;
            display: inline-block;
            -webkit-text-stroke: 1px #00000055;
        }

        /* Floating celebration effect */
        .floating-meme {
            position: fixed;
            pointer-events: none;
            z-index: 400;
            font-size: 36px;
            animation: floatMemesUp 2.2s forwards;
        }

        @keyframes floatMemesUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-350px) scale(1.4); opacity: 0; }
        }

        /* Hide yes button after click */
        .hide-yes-meme {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: 0.2s;
        }

        /* Hide NO button completely when second page opens */
        .no-btn-hidden {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* Button responsive for mobile */
        @media (max-width: 768px) {
            .meme-btn {
                font-size: 1.4rem;
                padding: 10px 20px;
                min-width: 130px;
            }
            .button-group-meme {
                gap: 1.2rem;
            }
            .meme-footer-text {
                font-size: 1rem;
                padding: 4px 18px;
            }
            .dog-victory-text {
                font-size: 1.5rem;
                padding: 4px 16px;
            }
        }
        
        @media (max-width: 480px) {
            .meme-btn {
                font-size: 1.2rem;
                padding: 8px 16px;
                min-width: 110px;
            }
            .button-group-meme {
                gap: 1rem;
            }
            .meme-sub {
                font-size: 0.9rem;
                padding: 4px 12px;
            }
            .dog-victory-text {
                font-size: 1.2rem;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>

<!-- FIRST PAGE: QUESTION + BUTTONS (SIDE BY SIDE) -->
<div class="first-page" id="firstPage">
    <div class="meme-container">
        <div class="meme-question">😂 BHAI TU EK NUMBER KA GANDU HAI NA? 😂</div>
        <div class="meme-sub">💀 SACHCHAI KA DARWAJA KHOLO 💀</div>
        
        <!-- BUTTONS SIDE BY SIDE (FLEX) -->
        <div class="button-group-meme" id="memeButtonGroup">
            <button class="meme-btn btn-yes-meme" id="yesMemeBtn">✔️ HAAN</button>
            <button class="meme-btn btn-no-meme" id="noMemeBtn">❌ NAHI</button>
        </div>
        <div class="meme-footer-text">👇 MAUKA HAI TOH CLICK KAR 👇</div>
    </div>
</div>

<!-- DOOR OVERLAY ANIMATION -->
<div id="doorContainerMeme" class="door-animation-container">
    <div class="door-left-panel" id="leftDoorMeme"></div>
    <div class="door-right-panel" id="rightDoorMeme"></div>
    <div style="position: absolute; width:100%; height:100%; display: flex; align-items: center; justify-content: center; z-index:1; font-size: 55px; font-weight: bold; color:#ffcc66;">🚪</div>
</div>

<!-- FINAL DOG PAGE (LAST PAGE - NO BUTTONS) -->
<div id="dogFinalPage" class="dog-final-page">
    <div class="dog-card">
        <img id="dogImageFinal" class="dog-image" alt="DOG LAUGH MEME" src="image/doglaugh.jpg">
        <div class="dog-victory-text">✨ DEKHA MAINE KAHA THA GANDU HAI TU ✨</div>
        <!-- NO BUTTONS HERE - PURE DOG PAGE -->
    </div>
</div>

<script>
    (function() {
        // ---------- DOM ELEMENTS ----------
        const firstPage = document.getElementById('firstPage');
        const yesBtn = document.getElementById('yesMemeBtn');
        const noBtn = document.getElementById('noMemeBtn');
        const doorContainer = document.getElementById('doorContainerMeme');
        const leftDoor = document.getElementById('leftDoorMeme');
        const rightDoor = document.getElementById('rightDoorMeme');
        const dogFinalPage = document.getElementById('dogFinalPage');
        const dogImg = document.getElementById('dogImageFinal');

        let isYesActivated = false;
        let noFloatingActive = false;
        let evasionActive = false;
        
        // ---------- IMAGE PATH (image/doglaugh.jpg) with fallback ----------
        dogImg.onerror = function() {
            this.src = "https://media1.tenor.com/m/-JjW8KJ0hS4AAAAC/dog-pointing.gif";
            this.alt = "doglaugh missing but meme continues";
            console.warn("Make sure 'image/doglaugh.jpg' exists inside 'image' folder relative to html file.");
        };
        
        // ---------- FUNCTION TO COMPLETELY HIDE NO BUTTON ----------
        function hideNoButtonCompletely() {
            if (noBtn) {
                noBtn.classList.add('no-btn-hidden');
                noBtn.style.display = 'none';
                noBtn.style.visibility = 'hidden';
                noBtn.style.pointerEvents = 'none';
            }
        }
        
        // ---------- NO BUTTON FLOATING MECHANISM ----------
        function makeNoButtonFloating() {
            if (noFloatingActive) return;
            if (isYesActivated) return;
            if (!noBtn) return;
            
            document.body.appendChild(noBtn);
            noBtn.style.position = 'absolute';
            noBtn.style.margin = '0';
            noBtn.style.top = '0px';
            noBtn.style.left = '0px';
            noBtn.style.zIndex = '9999';
            noBtn.style.transition = 'left 0.12s cubic-bezier(0.2, 1.3, 0.8, 1), top 0.12s cubic-bezier(0.2, 1.3, 0.8, 1)';
            noFloatingActive = true;
            relocateNoAbsolute();
        }
        
        function getRandomViewportPos() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (!noBtn) return { x: 100, y: 100 };
            const btnRect = noBtn.getBoundingClientRect();
            let btnW = btnRect.width || 130;
            let btnH = btnRect.height || 60;
            const maxX = Math.max(20, w - btnW - 25);
            const maxY = Math.max(20, h - btnH - 25);
            let randX = Math.random() * maxX;
            let randY = Math.random() * maxY;
            randX = Math.min(maxX - 10, Math.max(15, randX));
            randY = Math.min(maxY - 10, Math.max(15, randY));
            return { x: randX, y: randY };
        }
        
        function relocateNoAbsolute() {
            if (!noFloatingActive) return;
            if (isYesActivated) return;
            if (!noBtn) return;
            if (noBtn.classList.contains('no-btn-hidden')) return;
            const { x, y } = getRandomViewportPos();
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            noBtn.style.transform = 'rotate(1deg)';
            setTimeout(() => { if(noBtn && noFloatingActive && !noBtn.classList.contains('no-btn-hidden')) noBtn.style.transform = ''; }, 100);
        }
        
        function startGlobalEvasion() {
            if (evasionActive) return;
            evasionActive = true;
            document.addEventListener('mousemove', (e) => {
                if (!noFloatingActive || isYesActivated) return;
                if (!noBtn) return;
                if (noBtn.classList.contains('no-btn-hidden')) return;
                const rect = noBtn.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                const dist = Math.hypot(e.clientX - centerX, e.clientY - centerY);
                if (dist < 110) relocateNoAbsolute();
            });
            document.addEventListener('touchmove', (e) => {
                if (!noFloatingActive || isYesActivated) return;
                if (!noBtn) return;
                if (noBtn.classList.contains('no-btn-hidden')) return;
                const touch = e.touches[0];
                if (touch) {
                    const rect = noBtn.getBoundingClientRect();
                    const centerX = rect.left + rect.width/2;
                    const centerY = rect.top + rect.height/2;
                    const dist = Math.hypot(touch.clientX - centerX, touch.clientY - centerY);
                    if (dist < 110) relocateNoAbsolute();
                }
            });
        }
        
        function bindNoEscape() {
            if (!noBtn) return;
            noBtn.addEventListener('mouseenter', function(e) {
                if (isYesActivated) return;
                if (noBtn.classList.contains('no-btn-hidden')) return;
                if (!noFloatingActive) {
                    makeNoButtonFloating();
                    startGlobalEvasion();
                } else {
                    relocateNoAbsolute();
                }
            });
            noBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (isYesActivated) return;
                if (noBtn.classList.contains('no-btn-hidden')) return;
                if (!noFloatingActive) {
                    makeNoButtonFloating();
                    startGlobalEvasion();
                }
                relocateNoAbsolute();
                return false;
            });
            noBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                if (isYesActivated) return;
                if (noBtn.classList.contains('no-btn-hidden')) return;
                if (!noFloatingActive) {
                    makeNoButtonFloating();
                    startGlobalEvasion();
                } else {
                    relocateNoAbsolute();
                }
            });
            window.addEventListener('resize', () => {
                if (noFloatingActive && !isYesActivated && noBtn && !noBtn.classList.contains('no-btn-hidden')) {
                    const { x, y } = getRandomViewportPos();
                    noBtn.style.left = x + 'px';
                    noBtn.style.top = y + 'px';
                }
            });
        }
        
        // ---------- YES BUTTON DOOR MAGIC + FINAL DOG PAGE ----------
        function startDoorAndRevealDog() {
            if (isYesActivated) return;
            isYesActivated = true;
            
            hideNoButtonCompletely();
            yesBtn.classList.add('hide-yes-meme');
            
            const btnRect = yesBtn.getBoundingClientRect();
            const startX = btnRect.left + btnRect.width/2;
            const startY = btnRect.top + btnRect.height/2;
            doorContainer.style.transition = 'all 0.45s cubic-bezier(0.2, 1.2, 0.3, 1)';
            doorContainer.style.left = startX + 'px';
            doorContainer.style.top = startY + 'px';
            doorContainer.style.transform = 'translate(-50%, -50%) scale(0.15)';
            doorContainer.style.opacity = '1';
            doorContainer.style.visibility = 'visible';
            doorContainer.style.width = '60px';
            doorContainer.style.height = '60px';
            doorContainer.style.borderRadius = '30px';
            
            doorContainer.offsetHeight;
            
            doorContainer.style.width = '380px';
            doorContainer.style.height = '420px';
            doorContainer.style.borderRadius = '36px';
            doorContainer.style.left = '50%';
            doorContainer.style.top = '50%';
            doorContainer.style.transform = 'translate(-50%, -50%) scale(1)';
            
            setTimeout(() => {
                if (leftDoor) leftDoor.style.transform = 'rotateY(-90deg)';
                if (rightDoor) rightDoor.style.transform = 'rotateY(90deg)';
                doorContainer.style.boxShadow = '0 0 0 8px #ffaa44, 0 30px 50px black';
                
                setTimeout(() => {
                    doorContainer.style.visibility = 'hidden';
                    doorContainer.style.opacity = '0';
                    
                    if (firstPage) {
                        firstPage.classList.add('hide-first');
                    }
                    
                    dogImg.src = "image/doglaugh.jpg?" + Date.now();
                    dogFinalPage.classList.add('show');
                    generateMemeConfetti();
                    
                }, 550);
            }, 480);
        }
        
        function generateMemeConfetti() {
            for (let i=0; i<80; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    const icons = ['😂', '🤣', '🔥', '💀', '👌', '💯', '🐕', '👉', '😎', '✨', '🎉'];
                    el.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                    el.classList.add('floating-meme');
                    el.style.left = Math.random() * window.innerWidth + 'px';
                    el.style.bottom = '-30px';
                    el.style.fontSize = (Math.random() * 34 + 22) + 'px';
                    el.style.animationDuration = (Math.random() * 1.8 + 1.4) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 2100);
                }, i * 30);
            }
        }
        
        function initDoorStyle() {
            if(leftDoor && rightDoor) {
                leftDoor.style.transition = 'transform 0.55s ease-in-out';
                rightDoor.style.transition = 'transform 0.55s ease-in-out';
                leftDoor.style.transform = 'rotateY(0deg)';
                rightDoor.style.transform = 'rotateY(0deg)';
                leftDoor.style.backgroundColor = '#b87a2b';
                rightDoor.style.backgroundColor = '#b87a2b';
            }
            doorContainer.style.visibility = 'hidden';
            doorContainer.style.opacity = '0';
        }
        
        function bindYesAction() {
            yesBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (isYesActivated) return;
                startDoorAndRevealDog();
            });
            yesBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (isYesActivated) return;
                startDoorAndRevealDog();
            });
        }
        
        function preloadDogImage() {
            const testImg = new Image();
            testImg.onload = () => console.log("✅ doglaugh.jpg ready");
            testImg.onerror = () => console.warn("⚠️ image/doglaugh.jpg not found");
            testImg.src = "image/doglaugh.jpg";
        }
        
        window.addEventListener('load', () => {
            initDoorStyle();
            bindNoEscape();
            bindYesAction();
            preloadDogImage();
            
            if (firstPage) firstPage.classList.remove('hide-first');
            dogFinalPage.classList.remove('show');
            
            if (noBtn) {
                noBtn.style.position = 'relative';
                noBtn.style.display = 'inline-flex';
                noBtn.classList.remove('no-btn-hidden');
            }
        });
        
        window.addEventListener('resize', () => {
            if (noFloatingActive && !isYesActivated && noBtn && !noBtn.classList.contains('no-btn-hidden')) {
                const { x, y } = getRandomViewportPos();
                noBtn.style.left = x + 'px';
                noBtn.style.top = y + 'px';
            }
        });
        
    })();
</script>
</body>
</html>
